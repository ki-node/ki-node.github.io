name: Static, unit and build checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Static, unit and build checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Rebuild locked embedded projects
        run: npm run sync:projects

      - name: Verify locked project builds are reproducible
        run: |
          git diff --exit-code -- projects.lock.json public/projects
          test -z "$(git status --porcelain --untracked-files=all -- projects.lock.json public/projects)"

      - name: Run static, unit and signing checks
        run: npm run check

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Test native and web project integration
        run: npm run test:e2e

      - name: Build web application
        run: npm run build

      - name: Verify web build contains unchanged embedded project files
        run: npm run check:project-copy

      - name: Synchronize iOS project
        run: npx cap sync ios

      - name: Verify iOS bundle contains unchanged embedded project files
        run: npm run check:ios-project-copy

      - name: Verify generated iOS files are current
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"
